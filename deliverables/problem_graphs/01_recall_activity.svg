<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1350" viewBox="0 0 2400 1350"><rect x="0" y="0" width="2400" height="1350" rx="0" fill="#F4F0E6" stroke="none" stroke-width="0"/><rect x="96" y="56" width="68" height="68" rx="0" fill="#143B37" stroke="#143B37" stroke-width="3"/><text x="130" y="101" fill="#FFFDF8" font-family="Aptos, Carlito, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" letter-spacing="0" opacity="1" style="">FFF</text><text x="188" y="101" fill="#143B37" font-family="Aptos, Carlito, Arial, sans-serif" font-size="30" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">Farms for Food</text><text x="2304" y="101" fill="#B94735" font-family="Aptos, Carlito, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="end" letter-spacing="3" opacity="1" style="">PROBLEM 01 · RECALL LOAD</text><text x="96" y="212" fill="#132524" font-family="Aptos, Carlito, Arial, sans-serif" font-size="69" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">Food-safety incidents created a sustained operating load in 2024.</text><text x="96" y="286" fill="#61706D" font-family="Aptos, Carlito, Arial, sans-serif" font-size="31" font-weight="400" text-anchor="start" letter-spacing="0" opacity="1" style="">Public federal data captured 1,387 FDA product records plus dozens of FSIS actions during the year.</text><rect x="96" y="370" width="1066" height="760" rx="28" fill="#143B37" stroke="none" stroke-width="0"/><text x="152" y="442" fill="#78B7A9" font-family="Aptos, Carlito, Arial, sans-serif" font-size="23" font-weight="700" text-anchor="start" letter-spacing="2.2" opacity="1" style="">FDA FOOD ENFORCEMENT · 2024</text><text x="152" y="530" fill="#FFFDF8" font-family="Aptos, Carlito, Arial, sans-serif" font-size="78" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">1,387</text><text x="436" y="524" fill="#FFFDF8" font-family="Aptos, Carlito, Arial, sans-serif" font-size="31" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">product records</text><text x="436" y="564" fill="#D7E7E1" font-family="Aptos, Carlito, Arial, sans-serif" font-size="23" font-weight="400" text-anchor="start" letter-spacing="0" opacity="1" style="">initiated during the year</text><text x="152" y="658" fill="#FFFDF8" font-family="Aptos, Carlito, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">Product records</text><rect x="152" y="685" width="830" height="54" rx="27" fill="#48635E" stroke="none" stroke-width="0"/><rect x="152" y="685" width="830" height="54" rx="27" fill="#B94735" stroke="none" stroke-width="0"/><text x="1006" y="724" fill="#FFFDF8" font-family="Aptos, Carlito, Arial, sans-serif" font-size="26" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">1,387</text><text x="152" y="808" fill="#FFFDF8" font-family="Aptos, Carlito, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">Distinct event IDs</text><rect x="152" y="835" width="830" height="54" rx="27" fill="#48635E" stroke="none" stroke-width="0"/><rect x="152" y="835" width="288.43547224224943" height="54" rx="27" fill="#78B7A9" stroke="none" stroke-width="0"/><text x="464.43547224224943" y="874" fill="#FFFDF8" font-family="Aptos, Carlito, Arial, sans-serif" font-size="26" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">482</text><rect x="152" y="962" width="954" height="140" rx="18" fill="#0E302D" stroke="#48635E" stroke-width="2"/><text x="180" y="1006" fill="#78B7A9" font-family="Aptos, Carlito, Arial, sans-serif" font-size="21" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">Why the units matter</text><text x="180" y="1044" fill="#FFFDF8" font-family="Aptos, Carlito, Arial, sans-serif" font-size="21" font-weight="400" text-anchor="start" letter-spacing="0"><tspan x="180" dy="0">One FDA enforcement event can contain multiple</tspan><tspan x="180" dy="29">product records. These figures are related—not additive.</tspan></text><rect x="1238" y="370" width="1066" height="760" rx="28" fill="#FFFDF8" stroke="#D9D2C2" stroke-width="3"/><text x="1294" y="442" fill="#B94735" font-family="Aptos, Carlito, Arial, sans-serif" font-size="23" font-weight="700" text-anchor="start" letter-spacing="2.2" opacity="1" style="">USDA FSIS · 2024</text><text x="1294" y="530" fill="#132524" font-family="Aptos, Carlito, Arial, sans-serif" font-size="72" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">34</text><text x="1428" y="516" fill="#132524" font-family="Aptos, Carlito, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="start" letter-spacing="0"><tspan x="1428" dy="0">numbered</tspan><tspan x="1428" dy="32">recall cases</tspan></text><line x1="1744" y1="482" x2="1744" y2="580" stroke="#D9D2C2" stroke-width="3" stroke-linecap="round"/><text x="1798" y="530" fill="#132524" font-family="Aptos, Carlito, Arial, sans-serif" font-size="72" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">19</text><text x="1934" y="516" fill="#132524" font-family="Aptos, Carlito, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="start" letter-spacing="0"><tspan x="1934" dy="0">Public Health</tspan><tspan x="1934" dy="32">Alerts</tspan></text><text x="1294" y="658" fill="#132524" font-family="Aptos, Carlito, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">Numbered recall cases</text><rect x="1294" y="685" width="830" height="54" rx="27" fill="#E8EEE9" stroke="none" stroke-width="0"/><rect x="1294" y="685" width="830" height="54" rx="27" fill="#1D6B62" stroke="none" stroke-width="0"/><text x="2148" y="724" fill="#132524" font-family="Aptos, Carlito, Arial, sans-serif" font-size="26" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">34</text><text x="1294" y="808" fill="#132524" font-family="Aptos, Carlito, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">Public Health Alerts</text><rect x="1294" y="835" width="830" height="54" rx="27" fill="#E8EEE9" stroke="none" stroke-width="0"/><rect x="1294" y="835" width="463.8235294117647" height="54" rx="27" fill="#C88C2C" stroke="none" stroke-width="0"/><text x="1781.8235294117646" y="874" fill="#132524" font-family="Aptos, Carlito, Arial, sans-serif" font-size="26" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">19</text><rect x="1294" y="962" width="954" height="140" rx="18" fill="#E8EEE9" stroke="none" stroke-width="0"/><text x="1322" y="1006" fill="#1D6B62" font-family="Aptos, Carlito, Arial, sans-serif" font-size="21" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">Do not collapse the categories</text><text x="1322" y="1044" fill="#132524" font-family="Aptos, Carlito, Arial, sans-serif" font-size="21" font-weight="400" text-anchor="start" letter-spacing="0"><tspan x="1322" dy="0">A Public Health Alert is not a numbered recall.</tspan><tspan x="1322" dy="29">FSIS and FDA also use different reporting units.</tspan></text><line x1="96" y1="1262" x2="2304" y2="1262" stroke="#D9D2C2" stroke-width="2" stroke-linecap="round"/><text x="96" y="1305" fill="#61706D" font-family="Aptos, Carlito, Arial, sans-serif" font-size="21" font-weight="400" text-anchor="start" letter-spacing="0" opacity="1" style="">Sources: openFDA Food Enforcement API; USDA FSIS Recall API · Calendar year 2024 · Retrieved 17 Jul 2026</text><text x="2304" y="1305" fill="#1D6B62" font-family="Aptos, Carlito, Arial, sans-serif" font-size="19" font-weight="700" text-anchor="end" letter-spacing="1.3" opacity="1" style="">PROBLEM EVIDENCE · NO PRODUCT OR DEMO DATA</text></svg>