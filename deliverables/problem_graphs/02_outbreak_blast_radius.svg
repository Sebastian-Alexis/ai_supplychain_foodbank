<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1350" viewBox="0 0 2400 1350"><rect x="0" y="0" width="2400" height="1350" rx="0" fill="#143B37" stroke="none" stroke-width="0"/><rect x="96" y="56" width="68" height="68" rx="0" fill="none" stroke="#FFFDF8" stroke-width="3"/><text x="130" y="101" fill="#FFFDF8" font-family="Aptos, Carlito, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" letter-spacing="0" opacity="1" style="">FFF</text><text x="188" y="101" fill="#FFFDF8" font-family="Aptos, Carlito, Arial, sans-serif" font-size="30" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">Farms for Food</text><text x="2304" y="101" fill="#D7E7E1" font-family="Aptos, Carlito, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="end" letter-spacing="3" opacity="1" style="">PROBLEM 02 · BLAST RADIUS</text><text x="96" y="212" fill="#FFFDF8" font-family="Aptos, Carlito, Arial, sans-serif" font-size="62" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">One ingredient reached at least 12 states—and cases appeared in 14.</text><text x="96" y="286" fill="#D7E7E1" font-family="Aptos, Carlito, Arial, sans-serif" font-size="29" font-weight="400" text-anchor="start" letter-spacing="0" opacity="1" style="">FDA: recalled yellow onions were the likely source based on epidemiologic and traceback evidence.</text><text x="112" y="388" fill="#78B7A9" font-family="Aptos, Carlito, Arial, sans-serif" font-size="21" font-weight="700" text-anchor="start" letter-spacing="2.4" opacity="1" style="">HOW THE INCIDENT EXPANDED</text><line x1="206" y1="458" x2="206" y2="1070" stroke="#48635E" stroke-width="8" stroke-linecap="round"/><circle cx="206" cy="500" r="27" fill="#78B7A9" stroke="none" stroke-width="0"/><text x="270" y="488" fill="#78B7A9" font-family="Aptos, Carlito, Arial, sans-serif" font-size="21" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">SEP 27</text><text x="270" y="532" fill="#FFFDF8" font-family="Aptos, Carlito, Arial, sans-serif" font-size="31" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">First reported illness onset</text><text x="270" y="569" fill="#D7E7E1" font-family="Aptos, Carlito, Arial, sans-serif" font-size="22" font-weight="400" text-anchor="start" letter-spacing="0" opacity="1" style="">Illnesses were later reported across 14 states.</text><circle cx="206" cy="710" r="27" fill="#B94735" stroke="none" stroke-width="0"/><text x="270" y="698" fill="#E8A497" font-family="Aptos, Carlito, Arial, sans-serif" font-size="21" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">OCT 22</text><text x="270" y="742" fill="#FFFDF8" font-family="Aptos, Carlito, Arial, sans-serif" font-size="31" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">Taylor Farms initiates a voluntary recall</text><text x="270" y="780" fill="#D7E7E1" font-family="Aptos, Carlito, Arial, sans-serif" font-size="22" font-weight="400" text-anchor="start" letter-spacing="0"><tspan x="270" dy="0">Yellow onions had reached food-service customers in 12 confirmed states;</tspan><tspan x="270" dy="32">McDonald’s stopped using recalled onions in affected locations.</tspan></text><circle cx="206" cy="962" r="27" fill="#1D6B62" stroke="#FFFDF8" stroke-width="3"/><text x="270" y="950" fill="#78B7A9" font-family="Aptos, Carlito, Arial, sans-serif" font-size="21" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">DEC 3</text><text x="270" y="994" fill="#FFFDF8" font-family="Aptos, Carlito, Arial, sans-serif" font-size="31" font-weight="700" text-anchor="start" letter-spacing="0" opacity="1" style="">Outbreak declared over</text><text x="270" y="1031" fill="#D7E7E1" font-family="Aptos, Carlito, Arial, sans-serif" font-size="22" font-weight="400" text-anchor="start" letter-spacing="0" opacity="1" style="">FDA investigation closed after traceback, sampling, and customer action.</text><rect x="1370" y="388" width="934" height="742" rx="30" fill="#0E302D" stroke="#48635E" stroke-width="3"/><circle cx="1810" cy="710" r="255" fill="#1D6B62" stroke="none" stroke-width="0"/><text x="1810" y="690" fill="#FFFDF8" font-family="Aptos, Carlito, Arial, sans-serif" font-size="112" font-weight="700" text-anchor="middle" letter-spacing="0" opacity="1" style="">104</text><text x="1810" y="746" fill="#FFFDF8" font-family="Aptos, Carlito, Arial, sans-serif" font-size="29" font-weight="700" text-anchor="middle" letter-spacing="0" opacity="1" style="">reported cases</text><text x="1810" y="802" fill="#D7E7E1" font-family="Aptos, Carlito, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" letter-spacing="0" opacity="1" style="">14 states</text><rect x="1430" y="990" width="610" height="88" rx="44" fill="#B94735" stroke="none" stroke-width="0"/><text x="1735" y="1047" fill="#FFFFFF" font-family="Aptos, Carlito, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle" letter-spacing="0" opacity="1" style="">34 hospitalized among 98 with known status</text><rect x="2070" y="990" width="180" height="88" rx="44" fill="#7F2D23" stroke="none" stroke-width="0"/><text x="2160" y="1047" fill="#FFFFFF" font-family="Aptos, Carlito, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle" letter-spacing="0" opacity="1" style="">1 death</text><line x1="96" y1="1262" x2="2304" y2="1262" stroke="#48635E" stroke-width="2" stroke-linecap="round"/><text x="96" y="1305" fill="#D7E7E1" font-family="Aptos, Carlito, Arial, sans-serif" font-size="21" font-weight="400" text-anchor="start" letter-spacing="0" opacity="1" style="">Source: FDA, Outbreak Investigation of E. coli O157:H7: Onions · Data current 3 Dec 2024</text><text x="2304" y="1305" fill="#78B7A9" font-family="Aptos, Carlito, Arial, sans-serif" font-size="19" font-weight="700" text-anchor="end" letter-spacing="1.3" opacity="1" style="">PROBLEM EVIDENCE · NO PRODUCT OR DEMO DATA</text></svg>